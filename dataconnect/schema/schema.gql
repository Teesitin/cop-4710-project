type Applicant @table {
    name: String!
    email: String!
}

type Application @table {
    applicant: Applicant!
    job: Job!
    salaryProposed: Float
    status: String!
    appliedDate: Date!
}

type Job @table {
    applicant: Applicant!
    title: String!
    status: String!
    salary: String
}