# =========================================================
# Jobs
# =========================================================

query ListJobs($refresh: Float) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  jobs {
    id
    title
    status
    salary
  }
}

mutation CreateJob(
  $title: String!
  $status: String!
  $salary: Float
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  job_insert(data: {
    title: $title
    status: $status
    salary: $salary
  })
}

mutation UpdateJob(
  $id: UUID!
  $title: String!
  $status: String!
  $salary: Float
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  job_update(id: $id, data: {
    title: $title
    status: $status
    salary: $salary
  })
}

mutation UpdateJobStatus(
  $id: UUID!
  $status: String!
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  job_update(id: $id, data: {
    status: $status
  })
}

mutation DeleteJob($id: UUID!) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  job_delete(id: $id)
}


# =========================================================
# Applications
# =========================================================

query ListApplications($refresh: Float) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  applications {
    id
    name
    email
    jobId
    job {
      id
      title
      status
      salary
    }
    salaryProposed
    status
    appliedDate
  }
}

query GetApplication($id: UUID!, $refresh: Float) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  application(id: $id) {
    id
    name
    email
    jobId
    job {
      id
      title
      status
      salary
    }
    salaryProposed
    status
    appliedDate
  }
}

mutation CreateApplication(
  $name: String!
  $email: String!
  $jobId: UUID!
  $salaryProposed: Float
  $status: String!
  $appliedDate: Timestamp!
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
