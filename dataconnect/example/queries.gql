# =========================================================
# Employees
# =========================================================

query ListEmployees($refresh: Float) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  employees {
    id
    name
    email
    role
    jobId
    originalApplicationId

    job {
      id
      title
      status
      salary
    }

    originalApplication {
      id
      name
      email
      jobId
      job {
        id
        title
        status
        salary
      }
      salaryProposed
      status
      appliedDate
    }
  }
}

mutation CreateEmployee(
