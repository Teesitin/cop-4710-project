# =========================================================
# Jobs
# =========================================================

query ListJobs @auth(level: PUBLIC, insecureReason: "Local testing only") {
  jobs {
    id
    title
    status
    salary
  }
}

mutation CreateJob(
  $title: String!
  $status: String!
  $salary: String
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  job_insert(data: {
    title: $title
    status: $status
    salary: $salary
  })
}

mutation UpdateJob(
  $id: UUID!
  $title: String!
  $status: String!
  $salary: String
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  job_update(id: $id, data: {
    title: $title
    status: $status
    salary: $salary
  })
}

mutation UpdateJobStatus(
  $id: UUID!
  $status: String!
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  job_update(id: $id, data: {
    status: $status
  })
}

mutation DeleteJob($id: UUID!) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  job_delete(id: $id)
}


# =========================================================
# Applications
# =========================================================

query ListApplications @auth(level: PUBLIC, insecureReason: "Local testing only") {
  applications {
    id
    name
    email
    jobId
    job {
      id
      title
      status
      salary
    }
    salaryProposed
    status
    appliedDate
  }
}

query GetApplication($id: UUID!) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  application(id: $id) {
    id
    name
    email
    jobId
    job {
      id
      title
      status
      salary
    }
    salaryProposed
    status
    appliedDate
  }
}

mutation CreateApplication(
  $name: String!
  $email: String!
  $jobId: UUID!
  $salaryProposed: Float
  $status: String!
  $appliedDate: Date!
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  application_insert(data: {
    name: $name
    email: $email
    jobId: $jobId
    salaryProposed: $salaryProposed
    status: $status
    appliedDate: $appliedDate
  })
}

mutation UpdateApplication(
  $id: UUID!
  $name: String!
  $email: String!
  $jobId: UUID!
  $salaryProposed: Float
  $status: String!
  $appliedDate: Date!
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  application_update(id: $id, data: {
    name: $name
    email: $email
    jobId: $jobId
    salaryProposed: $salaryProposed
    status: $status
    appliedDate: $appliedDate
  })
}

mutation UpdateApplicationStatus(
  $id: UUID!
  $status: String!
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  application_update(id: $id, data: {
    status: $status
  })
}

mutation DeleteApplication($id: UUID!) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  application_delete(id: $id)
}


# =========================================================
# Employees
# =========================================================

query ListEmployees @auth(level: PUBLIC, insecureReason: "Local testing only") {
  employees {
    id
    name
    email
    role
    jobId
    originalApplicationId
    job {
      id
      title
      status
      salary
    }
    originalApplication {
      id
      name
      email
      status
      salaryProposed
      appliedDate
      jobId
    }
  }
}

mutation CreateEmployee(
  $name: String!
  $email: String!
  $role: String!
  $jobId: UUID!
  $originalApplicationId: UUID!
) @auth(level: PUBLIC, insecureReason: "Local testing only") {
  employee_insert(data: {
    name: $name
    email: $email
    role: $role
    jobId: $jobId
    originalApplicationId: $originalApplicationId
  })
}